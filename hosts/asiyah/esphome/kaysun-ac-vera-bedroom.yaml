esphome:
  name: kaysun-ac-vera-bedroom
  friendly_name: Kaysun AC Vera Bedroom
  name_add_mac_suffix: false

esp32:
  board: nodemcu-32s
  framework:
    type: arduino
    version: recommended

logger:
  baud_rate: 0

api:
  services:
    - service: follow_me
      variables:
        temperature: float
      then:
        midea_ac.follow_me:
          temperature: !lambda "return temperature;"
          beeper: false

ota:
  - platform: esphome
    id: ota_esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: on
  manual_ip:
    static_ip: 192.168.1.103
    gateway: 192.168.1.1
    subnet: 255.255.255.0
  ap:
    ssid: "kaysun-ac-vera-bedroom"
    password: !secret ap_password

captive_portal:

uart:
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 9600

climate:
  - platform: midea
    id: climate_control
    name: Air Conditioner
    autoconf: true
    outdoor_temperature:
      name: Outdoor Temperature
      id: outdoor_temperature
      accuracy_decimals: 1

switch:
  - platform: template
    name: Beeper
    id: beeper
    icon: mdi:volume-source
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    turn_on_action:
      midea_ac.beeper_on:
    turn_off_action:
      midea_ac.beeper_off:

button:
  - platform: restart
    name: Restart
  - platform: template
    name: Swing Step
    id: midea_swing_step
    icon: mdi:tailwind
    on_press:
      midea_ac.swing_step:

esp32_ble_tracker:

sensor:
  - platform: uptime
    type: seconds
    name: Uptime Sensor
  - platform: internal_temperature
    name: "ESP32 Internal Temperature"
  - platform: homeassistant
    entity_id: sensor.vindstyrka_temperature
    id: follow_me_sensor
    filters:
      - throttle: 10s
      - heartbeat: 2min
      - debounce: 1s
    on_value:
      midea_ac.follow_me:
        temperature: !lambda "return x;"
        beeper: false
  - platform: xiaomi_hhccjcy01
    mac_address: '5C:85:7E:12:DD:4B'
    temperature:
      name: "Mushroom Temperature"
    moisture:
      name: "Mushroom Moisture"
    illuminance:
      name: "Mushroom Illuminance"
    conductivity:
      name: "Mushroom Soil Conductivity"
    battery_level:
      name: "Mushroom Battery Level"