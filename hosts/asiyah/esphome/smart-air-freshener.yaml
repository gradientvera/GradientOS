number:
  - platform: cc1101
    output_power:
      name: output_power
      id: cc1101_output_power
    tuner:
      frequency:
        name: Tuner frequency
        id: cc1101_freq
      if_frequency:
        name: Tuner if_frequency
      bandwidth:
        name: Tuner bandwidth
      channel:
        name: Tuner channel
      channel_spacing:
        name: Tuner channel_spacing
      fsk_deviation:
        name: Tuner fsk_deviation
      msk_deviation:
        name: Tuner msk_deviation
      symbol_rate:
        name: Tuner symbol_rate
    agc:
      carrier_sense_abs_thr:
        name: AGC carrier_sense_abs_thr
  - platform: template
    id: ceiling_fan_signal_repeat
    name: Ceiling Fan Signal Repeat Times
    internal: true
    optimistic: True
    min_value: 1
    max_value: 40
    step: 1
    initial_value: 4

select:
  - platform: cc1101
    tuner:
      sync_mode:
        name: Tuner Sync Mode
      modulation:
        name: Tuner Modulation
    agc:
      magn_target:
        name: AGC magn_target
      max_lna_gain:
        name: AGC max_lna_gain
      max_dvga_gain:
        name: AGC max_dva_gain
      carrier_sense_rel_thr:
        name: AGC carrier_sense_rel_thr
      filter_length_fsk_msk:
        name: AGC filter_length_fsk_msk
      filter_length_ask_ook:
        name: AGC filter_length_ask_ook
      freeze:
        name: AGC freeze
      wait_time:
        name: AGC wait_time
      hyst_level:
        name: AGC hyst_level

switch:
  - platform: cc1101
    tuner:
      carrier_sense_above_threshold:
        name: Tuner carrier_sense_above_threshold
    agc:
      lna_priority:
        name: AGC lna_priority

remote_transmitter:
  pin: GPIO18  # GDO0
  carrier_duty_percent: 100%
  on_transmit:
    then:
      #- esp32_ble_tracker.stop_scan:
      #- lambda: |- 
      #     id(ble_proxy)->set_active(false);
      - cc1101.begin_tx: transceiver
  on_complete:
    then:
      - cc1101.end_tx: transceiver
      #- lambda: |- 
      #     id(ble_proxy)->set_active(true);
      #- esp32_ble_tracker.start_scan:
      #      continuous: true
remote_receiver:
  pin: GPIO14  # GDO2
  # dump:
    # - rc_switch
    # - raw
  tolerance: 50%
  filter: 250us
  idle: 4ms

api:
  services:
    - service: 'remote_transmit_raw'
      variables:
        code: int[]
        repeat: int
      then:
        - remote_transmitter.transmit_raw:
            code: !lambda 'return code;'
            repeat: 
              times: !lambda 'return repeat;'
    - service: 'remote_transmit_cc1101_ceiling_fan_code'
      variables:
        code: string
        repeat: int
      then:
        - lambda: id(cc1101_transmit_ceiling_fan_code)->execute(code, repeat);

script:
  - id: cc1101_transmit_ceiling_fan_code
    parameters:
      code: string
      repeat: int
    then:
      - number.set:
          id: cc1101_freq
          value: 434110
      - number.set:
          id: cc1101_output_power
          value: 7
      - remote_transmitter.transmit_raw:
          code: !lambda |-
            std::vector<long int> vec;
            for (int i = 0; i < code.length(); i++) {
              if (code[i] == '0') {
                vec.push_back(740);
                vec.push_back(-256);
              } else if (code[i] == '1') {
                vec.push_back(256);
                vec.push_back(-740);
              }
            }
            vec.push_back(256);
            vec.push_back(-8864);
            return vec;
          repeat: 
            times: !lambda 'return repeat;'
            wait_time: 0s

button:
  - platform: restart
    name: "Restart"
  - platform: template
    name: Spray
    id: spray
    icon: "mdi:spray"
    on_press:
      - logger.log: "Spraying..."
      - output.turn_on: dac_output_inv
      - output.turn_on: dac_output
      - output.set_level:
          id: dac_output_inv
          level: 100%
      - output.set_level:
          id: dac_output
          level: 0%
      - delay: 0.5s
      - output.set_level:
          id: dac_output_inv
          level: 0%
      - output.set_level:
          id: dac_output
          level: 25%
      - delay: 0.25s
      - output.turn_off: dac_output
      - output.turn_off: dac_output_inv
      - logger.log: "Sprayed!"
  - platform: template
