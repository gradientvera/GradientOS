esphome:
  name: air-freshener-vera-bedroom
  friendly_name: Air Freshener Vera Bedroom
  name_add_mac_suffix: false

external_components:
  - source: "github://gabest11/esphome@0d73a86e1b4ac0920110c484993e8c998d2880b9"
    components: [ cc1101 ]

esp32:
  board: nodemcu-32s
  framework:
    type: esp-idf
    version: recommended

logger:

mdns:
  disabled: false

ota:
  - platform: esphome
    id: ota_esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: on
  manual_ip:
    static_ip: 192.168.1.101
    gateway: 192.168.1.1
    subnet: 255.255.255.0
  ap:
    ssid: "Air Freshener ESP32"
    password: !secret ap_password

captive_portal:

output:
  - platform: esp32_dac
    pin: GPIO25
    id: dac_output
  - platform: esp32_dac
    pin: GPIO26
    id: dac_output_inv

text_sensor:
  - platform: version
    hide_timestamp: true
    name: "ESPHome Version"
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      icon: mdi:wifi
    ssid:
      name: "Connected SSID"
      icon: mdi:wifi-strength-2

